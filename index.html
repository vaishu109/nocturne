<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocturne | Instant Share</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="hub-mode">
    <header class="hub-header">
        <div class="room-info">
            <span class="room-label">Room:</span>
            <span class="room-code" id="roomCode">nocturne.net/vibe-7</span>
            <button class="copy-link-btn" onclick="copyRoomLink()"><i class="fas fa-link"></i></button>
        </div>
        <div class="user-identity" id="userIdentity">
            Initializing...
        </div>
    </header>

    <main id="app">
        <div class="hub-container">
            <div class="device-grid" id="deviceGrid">
                <!-- Devices will be rendered here -->
            </div>
        </div>
    </main>

    <div class="hub-footer">
        <p>Drop files anywhere to share with the room</p>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="globalFileInput" style="display: none" multiple>

    <script type="module" src="/main.js"></script>
</body>
</html>
